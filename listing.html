<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyres — SKT Tyres</title>
    <link rel="icon" href="images/SKT_logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="page-wrapper">

      <!-- NAVBAR -->
      <header class="navbar">
        <div class="container">
          <a href="index.html" class="navbar__logo">
            <img src="images/SKT_logo.png" alt="SKT Tyres">
          </a>
          <nav class="navbar__links">
            <a href="index.html#brands">Brands</a>
            <a href="index.html#categories">Categories</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
          </nav>
          <a href="#" class="btn btn--primary">Sign In</a>
        </div>
      </header>

      <!-- PAGE HEADER -->
      <section class="listing-hero">
        <div class="container">
          <p class="section__label">SKT Tyres</p>
          <h1 class="listing-hero__title">Tyre <span class="accent">Listings.</span></h1>
          <p class="listing-hero__sub">Browse our full catalogue. Visit the store or call us to place your order.</p>
        </div>
      </section>

      <!-- FILTERS + GRID -->
      <section class="listing">
        <div class="container listing__inner">

          <!-- FILTERS SIDEBAR -->
          <aside class="filters">
            <p class="filters__heading">Filter By</p>

            <div class="filter-group">
              <p class="filter-group__label">Brand</p>
              <label class="filter-option">
                <input type="checkbox" value="bridgestone"> Bridgestone
              </label>
              <label class="filter-option">
                <input type="checkbox" value="jk"> JK Tyre
              </label>
            </div>

            <div class="filter-group">
              <p class="filter-group__label">Vehicle Type</p>
              <label class="filter-option">
                <input type="checkbox" value="cars"> Cars & SUVs
              </label>
              <label class="filter-option">
                <input type="checkbox" value="trucks"> Trucks & Commercial
              </label>
            </div>

            <div class="filter-group">
              <p class="filter-group__label">Size</p>
              <label class="filter-option"><input type="checkbox" value="165/80R14"> 165/80 R14</label>
              <label class="filter-option"><input type="checkbox" value="185/65R15"> 185/65 R15</label>
              <label class="filter-option"><input type="checkbox" value="195/65R15"> 195/65 R15</label>
              <label class="filter-option"><input type="checkbox" value="205/55R16"> 205/55 R16</label>
              <label class="filter-option"><input type="checkbox" value="215/60R17"> 215/60 R17</label>
              <label class="filter-option"><input type="checkbox" value="225/45R18"> 225/45 R18</label>
              <label class="filter-option"><input type="checkbox" value="750R16"> 750 R16</label>
              <label class="filter-option"><input type="checkbox" value="1000R20"> 1000 R20</label>
            </div>

            <button class="btn btn--outline" id="clearFilters">Clear Filters</button>
          </aside>

          <!-- TYRE GRID -->
          <div class="tyre-grid" id="tyreGrid">
            
          </div><!-- end tyre-grid -->

        </div>
      </section>

    </div>
    <script src="script.js"></script>
  </body>
</html>
